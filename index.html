<script>
  let dashboard = null;

  async function init() {
    try {
      document.getElementById("status").innerText = "⏳ Connecting to Tableau...";
      document.querySelector("button").disabled = true;

      await tableau.extensions.initializeAsync();

      dashboard = tableau.extensions.dashboardContent.dashboard;

      document.getElementById("status").innerText = "✅ Connected!";
      document.querySelector("button").disabled = false;

    } catch (e) {
      console.error(e);
      document.getElementById("status").innerText = "❌ Failed to connect";
    }
  }

  function extractFilters(input) {
    input = input.toLowerCase();

    let filters = {
      region: "All",
      category: "All",
      segment: "All",
      year: "All"
    };

    if (input.includes("west")) filters.region = "West";
    else if (input.includes("east")) filters.region = "East";
    else if (input.includes("south")) filters.region = "South";
    else if (input.includes("central")) filters.region = "Central";

    if (input.includes("furniture")) filters.category = "Furniture";
    else if (input.includes("office")) filters.category = "Office Supplies";
    else if (input.includes("technology") || input.includes("tech")) filters.category = "Technology";

    if (input.includes("consumer")) filters.segment = "Consumer";
    else if (input.includes("corporate")) filters.segment = "Corporate";
    else if (input.includes("home office")) filters.segment = "Home Office";

    const match = input.match(/\b(20\d{2})\b/);
    if (match) filters.year = match[1];

    return filters;
  }

  async function applyFilters() {
    if (!dashboard) {
      alert("⏳ Still connecting… wait a second");
      return;
    }

    const input = document.getElementById("query").value;
    const filters = extractFilters(input);

    try {
      const worksheets = dashboard.worksheets;

      for (let ws of worksheets) {

        if (filters.region !== "All") {
          await ws.applyFilterAsync("Region", [filters.region], tableau.FilterUpdateType.Replace);
        }

        if (filters.category !== "All") {
          await ws.applyFilterAsync("Category", [filters.category], tableau.FilterUpdateType.Replace);
        }

        if (filters.segment !== "All") {
          await ws.applyFilterAsync("Segment", [filters.segment], tableau.FilterUpdateType.Replace);
        }

        if (filters.year !== "All") {
          await ws.applyFilterAsync("Year", [filters.year], tableau.FilterUpdateType.Replace);
        }
      }

      alert("✅ Filters Applied!");

    } catch (err) {
      alert("❌ Error: " + err.message);
    }
  }

  window.onload = init;
</script>
